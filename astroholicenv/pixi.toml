[workspace]
authors = ["Til Birnstiel <til.birnstiel@lmu.de>"]
channels = ["conda-forge"]
name = "astroholicenv"
platforms = ["osx-arm64"]
version = "0.1.0"
[tasks]

[dependencies]
python = ">=3.14.4,<3.15"
numpy = ">=2.4.3,<3"
scipy = ">=1.17.1,<2"
matplotlib = ">=3.10.8,<4"
tqdm = ">=4.67.3,<5"
astropy = ">=7.2.0,<8"
ipython = ">=9.12.0,<10"
ipykernel = ">=7.2.0,<8"
jupyter = ">=1.1.1,<2"
meson-python = ">=0.19.0,<0.20"
pip = ">=26.0.1,<27"
pillow = ">=12.2.0,<13"
scikit-image = ">=0.26.0,<0.27"

[pypi-dependencies]
build = ">=1.4.3, <2"
astroholic = {path = "..", editable = true}